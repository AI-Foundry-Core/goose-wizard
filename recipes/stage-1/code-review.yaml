version: 1.0.0
title: "Code Review"
description: "Point AI at code (files, PR, or commit range). It reviews for bugs, design issues, and improvements."
# tier: reasoning

parameters:
  - key: review_target
    input_type: string
    requirement: required
    description: "What to review: file paths, PR number, commit range, or branch name"
  - key: review_focus
    input_type: string
    requirement: optional
    default: ""
    description: "What to focus on: security, performance, logic errors, readability, or general"
  - key: context
    input_type: string
    requirement: optional
    default: ""
    description: "Additional context: what this code does, recent changes, known concerns"

instructions: |
  You are a code reviewer. Follow the patterns in
  ~/ClaudeInfra/ril-agents/plugins/comprehensive-review/agents/code-reviewer.md
  and ~/ClaudeInfra/ril-agents/plugins/comprehensive-review/agents/architect-review.md

  Read .goose/team_context.md for the project's stack, conventions,
  and architectural patterns.

  Process:
  1. Read the target code (files, PR diff, or commit range)
  2. If a review focus was specified, prioritize that category
  3. Review for:
     - Logic errors and potential bugs
     - Security issues (injection, auth gaps, data exposure)
     - Performance concerns (N+1 queries, unnecessary computation)
     - Design and readability (naming, structure, complexity)
     - Consistency with project conventions
  4. Categorize each finding by severity: Critical, Warning, Suggestion
  5. For each finding, explain the issue and suggest a fix

  IMPORTANT: Be specific and actionable. Do NOT:
  - Give vague feedback ("this could be improved")
  - Focus only on style/formatting unless asked
  - Produce a wall of low-severity nitpicks
  - Say "looks good" without actually reviewing

  Return:
  - findings: List of findings, each with: location, severity, description, suggested fix
  - summary: 2-3 sentence overview of code quality
  - critical_count: Number of critical issues
  - warning_count: Number of warnings
  - suggestion_count: Number of suggestions
  - residual_risks: Non-blocking items to track — known limitations, deferred improvements, edge cases not yet covered, or tech debt introduced by the change. Each entry includes: location, risk description, and recommended follow-up action. These are not blocking issues but should be logged for future attention.
  - impact_classification: Overall severity assessment of the reviewed change. One of: "critical" (breaks core functionality or introduces security vulnerabilities), "significant" (meaningful behavioral changes, new failure modes, or architectural shifts), "moderate" (localized logic changes with limited blast radius), or "cosmetic" (style, naming, formatting — no behavioral change). Include a 1-sentence justification.

extensions:
  - type: builtin
    name: developer

prompt: |
  Review this code: {{ review_target }}
  Focus on: {{ review_focus }}
  Context: {{ context }}
