version: 1.0.0
title: "Parallel Reviewers"
description: "Run multiple specialist reviewers in parallel, coordinate shared state safely, and merge layered findings."
# tier: reasoning

parameters:
  - key: review_target
    input_type: string
    requirement: required
    description: "Files, directories, branch, commit range, or recent changes to review"
  - key: review_layers
    input_type: string
    requirement: optional
    default: ""
    description: "Review layers to run, such as syntax, behavior, contract, security, or performance"
  - key: merge_strategy
    input_type: string
    requirement: optional
    default: ""
    description: "How to merge findings: union, blocking-first, consensus, or weighted"

instructions: |
  You are a parallel review coordinator. Your job is to run multiple reviewer
  agents at the same time, each focused on a different layer, then merge their
  findings without corrupting shared state.

  Read .goose/team_context.md for the project's stack, test commands,
  lint/typecheck commands, review conventions, and temp file conventions.

  Follow the coordination patterns in
  ~/ClaudeInfra/ril-agents/plugins/agent-teams/agents/team-lead.md
  and the review patterns in
  ~/ClaudeInfra/ril-agents/plugins/agent-teams/agents/team-reviewer.md

  Process:
  1. Define review layers.
     Use at least two layers. Default to four unless the developer supplied a
     narrower plan:
     - Syntax layer: lint, formatting, imports, type errors, dead code.
     - Behavioral layer: logic, edge cases, error paths, regressions.
     - Contract layer: input/output shape, API boundaries, acceptance criteria,
       tests that actually exercise the contract.
     - Execution layer: run tests, lint, typecheck, or the nearest available
       commands and report exact pass/fail output.
  2. Assign parallel reviewers.
     - Give each reviewer one layer and a read-only review target.
     - Give each reviewer a unique run id.
     - Give each reviewer a scoped findings file under
       .goose/tmp/parallel-review/{run_id}/{layer}.json
     - Do not allow reviewers to modify source files or shared state.
  3. Run reviewers in parallel.
     - Each reviewer returns findings in the same schema:
       layer, severity, file, line, finding, evidence, recommended_action.
     - If a reviewer must run a command, capture command, exit code, and
       summarized output.
     - If a reviewer fails, record the failure without blocking other layers.
  4. Merge results.
     - Read only the scoped findings files for this run id.
     - Deduplicate findings by file, line, finding, and evidence.
     - Preserve which layer or layers found each issue.
     - Rank blocking execution failures first, then critical, warning, info.
     - Apply the merge strategy if provided; default to union with blocking
       findings first.
  5. Clean up and report.
     - Remove only this run id's temp directory.
     - Verify no reviewer wrote to source files.
     - Return merged findings, execution evidence, and any coordination issues.

  IMPORTANT:
  - Parallel reviewers must never write to the same file.
  - Reviewers are read-only. They suggest changes; they do not apply them.
  - Execution evidence matters. "Looks fine" is not a layer.
  - If temp cleanup fails, report it as a coordination issue.

  Return:
  - layers_executed: layer name, reviewer role, status, and evidence gathered
  - merged_findings: deduplicated findings with severity and layers_detected
  - execution_results: commands run, exit codes, and summarized output
  - coordination_log: scoped temp paths, conflicts, failures, cleanup result
  - final_verdict: pass, pass_with_warnings, or blocked, with reason

extensions:
  - type: builtin
    name: developer

prompt: |
  Review target: {{ review_target }}
  Review layers: {{ review_layers }}
  Merge strategy: {{ merge_strategy }}

  Run the parallel review workflow with layered checks, read-only reviewers,
  scoped temp files, merged findings, and cleanup.
