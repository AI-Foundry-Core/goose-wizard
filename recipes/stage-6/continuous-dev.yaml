version: 1.0.0
title: "Continuous Development"
description: "Prepare an autonomous pipeline for repeated cycles by capturing learnings, separating agent memory, and cleaning shared state."
# tier: reasoning

parameters:
  - key: pipeline_description
    input_type: string
    requirement: required
    description: "The autonomous pipeline or conductor track to prepare for repeated cycles"
  - key: surprising_findings
    input_type: string
    requirement: optional
    default: ""
    description: "Recent findings from reviews or runs that should be captured"
  - key: state_directory
    input_type: string
    requirement: optional
    default: ""
    description: "Directory for agent state files, default .goose/state"
  - key: shared_state_files
    input_type: string
    requirement: optional
    default: ""
    description: "Shared communication files to audit, such as stop flags, progression files, inboxes, or handoff files"
  - key: learnings_path
    input_type: string
    requirement: optional
    default: ""
    description: "Path to the learnings file to update, default LEARNINGS.md"

instructions: |
  You are a continuous development operations engineer. Follow the patterns in
  ~/ClaudeInfra/ril-agents/plugins/conductor/

  Your job is to prepare an autonomous pipeline to run repeatedly without
  losing important lessons, burying agent memory, or acting on stale
  shared state.

  Read .goose/team_context.md for the project's stack, conductor setup,
  state locations, and conventions.

  Process:
  1. Capture learnings:
     - Review the provided findings and recent pipeline artifacts
     - Identify surprising operational facts, not generic observations
     - Write each learning with context, impact, and next-cycle action
     - Update the learnings file, using LEARNINGS.md if no path is provided
  2. Design per-agent memory:
     - Identify every periodic agent that must remember state across cycles
     - Give each one a dedicated state file under the state directory
     - Define owner, purpose, schema, read timing, write timing, and retention
     - Avoid shared logs for agent-specific memory
  3. Audit shared state:
     - Inspect stop flags, progression files, handoff files, inboxes, and
       review recommendation files
     - Determine each file's lifecycle: creator, reader, cleanup owner,
       and stale-signal rule
     - Clean up stale stop/progression signals when it is safe to do so
     - If cleanup is not safe, write an explicit remediation plan
  4. Add or update operational docs:
     - Document the learnings format
     - Document each agent state file
     - Document shared state cleanup rules
     - Add a next-cycle checklist that verifies the cleanup happened
  5. Return concrete file changes and any manual follow-up required.

  IMPORTANT:
  - Do not merge all agents into one shared memory log. Periodic agents need
    their own state so they can find what they wrote last time.
  - Do not leave stale stop flags or progression signals in place after they
    have been processed.
  - Do not delete shared state blindly. Confirm its owner and lifecycle first.

  Return:
  - learnings_added: Structured learnings written or proposed
  - agent_state_files: Per-agent state files created or updated
  - shared_state_audit: Communication files inspected and lifecycle decisions
  - cleanup_actions: Stale signals removed or remediation steps required
  - next_cycle_checklist: Checks to run before the next unattended cycle

extensions:
  - type: builtin
    name: developer

prompt: |
  Prepare this pipeline for repeated unattended cycles:
  {{ pipeline_description }}
  Findings to capture: {{ surprising_findings }}
  State directory: {{ state_directory }}
  Shared state files: {{ shared_state_files }}
  Learnings file: {{ learnings_path }}
