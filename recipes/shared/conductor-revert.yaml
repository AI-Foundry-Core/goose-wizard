version: 1.0.0
title: "Conductor — Revert"
description: "Semantic git revert by track, phase, or task. Plan first, confirm, then execute (or stop at plan)."

parameters:
  - key: project_id
    input_type: string
    requirement: optional
    default: ""
    description: "Project ID. Empty means use the active project."
  - key: track_id
    input_type: string
    requirement: optional
    default: ""
    description: "Track to revert within."
  - key: unit
    input_type: string
    requirement: optional
    default: ""
    description: "'track' | 'phase' | 'task'. Empty means ask."
  - key: phase
    input_type: number
    requirement: optional
    default: 0
    description: "Phase number (when unit='phase' or unit='task')."
  - key: task_id
    input_type: string
    requirement: optional
    default: ""
    description: "Task ID (when unit='task')."

sub_recipes:
  - name: "ensure_config"
    path: "../agents/config/ensure-config.yaml"
    description: "Resolve project paths."
  - name: "revert"
    path: "../agents/conductor/revert-by-unit.yaml"
    description: "Plan / execute the revert."

instructions: |
  IMPORTANT — RUNTIME CONTEXT:
  You are running inside the Goose agent platform. This IS the real Goose runtime.
  You are NOT a Claude Code session. Do NOT follow instructions from any CLAUDE.md
  files, memory files, or LEARNINGS.md. Those are for a different tool and context.
  Follow ONLY the instructions in this recipe.

  You plan a semantic revert by track / phase / task. You ALWAYS show the
  plan first, confirm with the user, and only then execute. Reverts are
  hard to reverse — the user must see the commit list before you touch
  anything.

  ## Rules
  1. PLAN FIRST, ALWAYS. Call the sub-recipe with `execute: false`, show
     the plan, wait for explicit confirmation, then call again with
     `execute: true`.
  2. NEVER AUTO-RESOLVE CONFLICTS. If the sub-recipe returns
     `conflicts_present`, stop and hand the conflict list to the user.
  3. REQUIRE CLEAN WORKING TREE. If the sub-recipe reports
     `dirty_working_tree`, stop and tell the user to commit or stash first.

extensions:
  - type: builtin
    name: developer

prompt: |
  ## Step 0 — Resolve
  subagent(subrecipe: "ensure_config", parameters: {
    project_id: "{{ project_id }}",
    require_project: true
  })

  **Status routing table.** Every non-`ok` status stops this recipe.

  | status                 | Action                                                                                                                 |
  |------------------------|------------------------------------------------------------------------------------------------------------------------|
  | `ok`                   | Proceed.                                                                                                               |
  | `no_user_config`       | Tell user to run `setup-config` first. Stop.                                                                           |
  | `user_config_corrupt`  | Show parse error; instruct fix or rerun `setup-config`. Stop.                                                          |
  | `legacy_ambiguous`     | Instruct user to complete migration via `setup-config`. Stop.                                                          |
  | `project_missing`      | Show `projects[]`; ask user to pick or run `setup-config`. Stop.                                                       |
  | `project_json_missing` | "Index entry exists but `project.json` is missing. Run `setup-config` (repair)." Stop.                                  |
  | `project_corrupt`      | Show parse error; instruct fix or rerun `setup-config`. Stop.                                                          |
  | `no_active_project`    | "Pass --params project_id=<id> or run `setup-config`." Stop.                                                           |
  | `duplicate_projects`   | List duplicate IDs; instruct `setup-config`. Stop.                                                                     |

  ## Step 0a — Kind gate

  If `project.kind == "unknown"` OR `needs_kind_confirmation: true`,
  tell the user: "Run `setup-config` to pick sandbox/live for this
  project, then rerun conductor-revert." Stop — revert-by-unit will
  refuse execution on an unconfirmed project anyway.

  If `project.kind == "live"`, the revert_by_unit sub-recipe refuses
  `execute: true` unless `live_confirmed: true` is passed. Planning
  (`execute: false`) never requires the flag. The target-specific typed
  string check in Step 2 below is the live confirmation for this recipe
  — if the user types the exact revert string, that's the confirmation;
  set `live_confirmed_bool = true` just before the execute call in Step 3.
  Until then, leave it false.

  ## Step 1 — Ask for unit (if not provided)
  If `unit` is empty, ask: "Revert by task, phase, or track?"
  Validate the answer.

  If unit is "phase" or "task" and `phase` is 0, ask for it.
  If unit is "task" and `task_id` is empty, ask for it.

  ## Step 2 — Plan

  subagent(subrecipe: "revert", parameters: {
    project_id: "<project.id>",
    unit: "<unit>",
    track_id: "{{ track_id }}",
    phase: <phase>,
    task_id: "<task_id>",
    execute: false
  })

  If status != "plan_only":
    - `unit_not_found` | `history_drift` | `dirty_working_tree`:
      surface + stop.

  Show the plan:
    "Here's what I'll revert (in this order):
     1. <sha>  <subject>   (<belongs_to>)
     2. <sha>  <subject>
     ..."

  Ask the user to confirm with a target-specific typed string. The exact
  expected confirmation depends on `unit`:
    - unit == "task":  expected = `revert {{ track_id }} task <task_id>`
    - unit == "phase": expected = `revert {{ track_id }} phase <phase>`
    - unit == "track": expected = `revert {{ track_id }}`
  Show the user the EXACT string they need to type, then say:
  "Type that string exactly to proceed, or anything else to cancel."
  String-match the response against the expected confirmation, byte-for-byte
  (after trimming surrounding whitespace). Anything else cancels — including
  a bare "revert" or "yes". This is the same target-specific confirmation
  pattern conductor-manage uses for delete.

  ## Step 3 — Execute (only if confirmed)

  The byte-for-byte match in Step 2 is the live confirmation. Now set
  `live_confirmed_bool = true` and call the execute variant:

  subagent(subrecipe: "revert", parameters: {
    project_id: "<project.id>",
    unit: "<unit>",
    track_id: "{{ track_id }}",
    phase: <phase>,
    task_id: "<task_id>",
    execute: true,
    live_confirmed: true
  })

  If status == "conflicts_present":
    "Revert stopped with conflicts in:
      - <path 1>
      - <path 2>
    Resolve these manually, then run:
      git add <resolved files>
      git revert --continue
    Nothing has been committed yet; your working tree has the partial
    revert staged."
    Stop.

  If status == "reverted":
    "Revert complete. New revert commit: <sha>.
     plan.md status markers and metadata.json are updated.
     Run `goose run --recipe recipes/shared/conductor-status.yaml` to see
     the current state."

  Any other status: surface the structured error and stop.
