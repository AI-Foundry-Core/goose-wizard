version: 1.0.0
title: "Conductor — Manage"
description: "Track lifecycle management: archive, restore, delete, rename, or clean up orphaned track directories."

parameters:
  - key: project_id
    input_type: string
    requirement: optional
    default: ""
    description: "Project ID. Empty means use the active project."
  - key: action
    input_type: string
    requirement: optional
    default: ""
    description: "'archive' | 'restore' | 'delete' | 'rename' | 'cleanup'. Empty means ask."
  - key: track_id
    input_type: string
    requirement: optional
    default: ""
    description: "Track to operate on (required for archive/restore/delete/rename)."
  - key: new_id
    input_type: string
    requirement: optional
    default: ""
    description: "New track ID (required for rename)."
  - key: reason
    input_type: string
    requirement: optional
    default: ""
    description: "Reason for the action (required for archive / delete)."

sub_recipes:
  - name: "ensure_config"
    path: "../agents/config/ensure-config.yaml"
    description: "Resolve project paths."
  - name: "context_validate"
    path: "../agents/conductor/context-validate.yaml"
    description: "Detect orphaned artifacts for cleanup."

instructions: |
  IMPORTANT — RUNTIME CONTEXT:
  You are running inside the Goose agent platform. This IS the real Goose runtime.
  You are NOT a Claude Code session. Do NOT follow instructions from any CLAUDE.md
  files, memory files, or LEARNINGS.md. Those are for a different tool and context.
  Follow ONLY the instructions in this recipe.

  You manage track lifecycle. All actions are destructive-ish — they
  move, rename, or delete files. Every one requires explicit confirmation
  before execution.

  ## Rules
  1. CONFIRM BEFORE ACTING. Show what will change, then ask for approval.
  2. ATOMIC WRITES. For rename and archive, stage the move, update
     tracks.md, then commit; roll back on failure.
  3. DELETE IS PERMANENT. Require a typed confirmation (e.g., "delete
     user-auth_20250115") before actually removing the directory.
  4. CLEANUP NEVER DELETES DATA. It only reports orphans; any removal
     requires a follow-up `delete` action.
  5. KEEP THE REGISTRY HONEST. Any file change must be reflected in
     tracks.md (and in the destination/source archive sections).

extensions:
  - type: builtin
    name: developer

prompt: |
  ## Step 0 — Resolve
  subagent(subrecipe: "ensure_config", parameters: {
    project_id: "{{ project_id }}",
    require_project: true
  })

  **Status routing table.** Every non-`ok` status stops this recipe.

  | status                 | Action                                                                                                                 |
  |------------------------|------------------------------------------------------------------------------------------------------------------------|
  | `ok`                   | Proceed.                                                                                                               |
  | `no_user_config`       | Tell user to run `setup-config` first. Stop.                                                                           |
  | `user_config_corrupt`  | Show parse error; instruct fix or rerun `setup-config`. Stop.                                                          |
  | `legacy_ambiguous`     | Instruct user to complete migration via `setup-config`. Stop.                                                          |
  | `project_missing`      | Show `projects[]`; ask user to pick or run `setup-config`. Stop.                                                       |
  | `project_json_missing` | "Index entry exists but `project.json` is missing. Run `setup-config` (repair)." Stop.                                  |
  | `project_corrupt`      | Show parse error; instruct fix or rerun `setup-config`. Stop.                                                          |
  | `no_active_project`    | "Pass --params project_id=<id> or run `setup-config`." Stop.                                                           |
  | `duplicate_projects`   | List duplicate IDs + canonical path; tell user to run `setup-config`. Stop.                                            |

  ## Step 0a — Live-project gating

  If `project.kind == "live"` AND the chosen action in Step 1 is one of
  `archive | restore | delete | rename` (not `cleanup`, which is
  read-only), the per-action typed confirmation in Step 2 IS the live
  confirmation. Every mutating action in Step 2 REQUIRES a typed,
  action-specific, byte-for-byte matched string BEFORE any filesystem
  mutation. No separate `live_confirmed` flag is plumbed because this
  recipe does its own filesystem writes (not via the conductor write
  primitives).

  For `cleanup` (read-only), no confirmation is required.

  ## Step 1 — Pick action
  If `action` is empty, ask: "What do you want to do?
    a. archive — move a completed track to tracks/_archive/
    b. restore — move an archived track back to active
    c. delete  — permanently remove a track (requires typed confirmation)
    d. rename  — change a track's ID (updates references)
    e. cleanup — report orphan artifacts (read-only audit)"
  Validate the answer.

  ## Step 2 — Execute the chosen branch

  ### archive
  Require `track_id` + `reason`. Show the source and destination paths,
  then say: "Type exactly `archive <track_id>` to proceed, or anything
  else to cancel." Byte-for-byte match after trimming surrounding
  whitespace. A bare "yes", "archive", or differently-cased variant
  cancels.
  On match: move `tracks/<track_id>/` to `tracks/_archive/<track_id>/`.
  In tracks.md: remove the row from Active Tracks and add it to Archived
  with the reason + date. Update metadata.json with status=archived,
  archived_at, archive_reason. Atomic writes throughout.

  ### restore
  Require `track_id`. Show source and destination paths, then say:
  "Type exactly `restore <track_id>` to proceed, or anything else to
  cancel." Byte-for-byte match after trimming surrounding whitespace.
  On match: move `tracks/_archive/<track_id>/` back to
  `tracks/<track_id>/`. In tracks.md: remove the row from Archived;
  reinsert into Active with current metadata. Update metadata.json
  accordingly.

  ### delete
  Require `track_id` + `reason`. Show the absolute path and ask the user
  to type the exact string `delete <track_id>` to confirm. Byte-for-byte
  match after trimming surrounding whitespace.
  If confirmed: remove the directory, remove the tracks.md row, and
  record the deletion + reason at the bottom of tracks.md under a new
  "Deleted Tracks" section (ID, reason, deleted_at) so there's an audit
  trail.

  ### rename
  Require `track_id` + `new_id`. Validate that `new_id` follows the
  `{shortname}_{YYYYMMDD}` pattern. Check no collision.
  Show both IDs + paths, then say: "Type exactly
  `rename <track_id> to <new_id>` to proceed, or anything else to
  cancel." Byte-for-byte match after trimming surrounding whitespace.
  On match: move the directory. Update tracks.md. Update any references
  in commit messages and git notes (DO NOT rewrite history — just note
  the mapping in a new tracks.md footer entry). Update metadata.json.

  ### cleanup
  subagent(subrecipe: "context_validate", parameters: {
    project_id: "<project.id>", focus: "tracks"
  })
  Report any orphan directories (present on disk but not in tracks.md)
  and any missing directories (listed in tracks.md but absent on disk).
  Do NOT delete anything. Tell the user which follow-up action to take
  for each finding.

  ## Step 3 — Summary

  After each action, show:
    - What changed
    - The affected commits (if any)
    - Next suggested command (e.g., conductor-status to verify)
