version: 1.0.0
title: "Apply Fixes"
description: "Apply Bucket A fixes from classify-findings, then git commit the changes."

parameters:
  - key: run_dir
    input_type: string
    requirement: required
    description: "Path to the pipeline run directory"
  - key: cycle_number
    input_type: string
    requirement: required
    description: "Current cycle number"

instructions: |
  You apply safe fixes identified by the classifier, then commit them.

  ## Read

  1. {{ run_dir }}/cycle-{{ cycle_number }}/classify-findings-output.json
  2. Extract the bucket_a array

  ## Apply Fixes

  For each Bucket A item:
  - Read the target file
  - Find the old_text
  - Replace with new_text
  - Verify the replacement was correct (read the file again)
  - If old_text is not found, skip and note it in the output

  ## Batch Fixes

  If batch_fix_candidates exist in the classification:
  - For each candidate, check all affected_modules
  - Apply the same structural fix to each module that has the gap
  - Include all batch-fixed files in the commit

  ## Git Commit

  After all fixes are applied:
  - Run: git add teaching/
  - Run: git commit -m "Cycle {{ cycle_number }}: {brief description of fixes}"
  - If no fixes were applied, skip the commit

  ## Changelog

  Append ALL findings (applied and skipped) to {{ run_dir }}/changelog.md with format:
  ```
  ## Cycle {N}
  ### Applied
  - **{finding}** — {file}: {before} → {after}. Confidence: {high/medium}.
  ### Skipped
  - **{finding}** — Reason: {why skipped}
  ```

  ## Output

  Write to: {{ run_dir }}/cycle-{{ cycle_number }}/apply-fixes-output.json

  ```json
  {
    "applied": [
      {"file": "path", "finding": "description", "commit": "hash or null"}
    ],
    "skipped": [
      {"file": "path", "finding": "description", "reason": "why"}
    ],
    "batch_fixed": [
      {"pattern": "description", "files_fixed": ["list"]}
    ]
  }
  ```

extensions:
  - type: builtin
    name: developer

prompt: |
  Apply Bucket A fixes for cycle {{ cycle_number }}.
  Read findings from: {{ run_dir }}/cycle-{{ cycle_number }}/classify-findings-output.json
  Write results to: {{ run_dir }}/cycle-{{ cycle_number }}/apply-fixes-output.json
  Append to changelog: {{ run_dir }}/changelog.md
