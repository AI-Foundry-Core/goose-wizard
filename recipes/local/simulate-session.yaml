version: 1.0.0
title: "Simulate Teaching Session"
description: "Run one teaching session with a facilitator and mock developer persona. Produces a transcript."

parameters:
  - key: run_dir
    input_type: string
    requirement: required
    description: "Path to the pipeline run directory"
  - key: cycle_number
    input_type: string
    requirement: required
    description: "Current cycle number"
  - key: persona
    input_type: string
    requirement: required
    description: "Persona name from personas.md (e.g., priya_eager, deepak_hostile)"
  - key: teaching_script
    input_type: string
    requirement: required
    description: "Path to the teaching script relative to project root (e.g., stage-2/review-gate)"
  - key: edge_cases
    input_type: string
    requirement: optional
    default: ""
    description: "Comma-separated edge case codes to force (e.g., E3_skip,E7_copilot)"

instructions: |
  You are simulating a teaching session between a facilitator and a mock developer.

  ## Setup

  1. Read the persona definition from overnight-pipeline/personas.md — find the section
     matching {{ persona }}. The persona's NEVER list is absolute — do not violate it.
  2. Read the teaching script at teaching/{{ teaching_script }}.teach.md
  3. Read teaching/meta/teacher-instructions.md for facilitator behavior rules
  4. Read .goose/team_context.md for project context (if it exists; if not, scan the
     project root for README.md, pyproject.toml, package.json to infer the stack)

  ## Stage Progression Context

  Determine the stage from the teaching script path. If Stage 2+, the developer has
  completed all prior stages. Include this context in the simulation:
  - "The developer has completed Stages 0 through {N-1}."
  - For Stages 5-7 (fully adaptive): the developer drives the conversation.

  ## Simulation Rules

  - The FACILITATOR follows the teaching script exactly
  - The MOCK DEVELOPER follows the persona definition — maintain traits throughout
  - For edge cases ({{ edge_cases }}), force them at natural points in the session
  - Do REAL code operations on the project using the developer extension
  - Format: [FACILITATOR]: and [PERSONA_NAME]: turns, with >> CODE OPERATION: blocks

  ## Persona Reinforcement

  At the midpoint of the session, re-read the persona definition. Does the most recent
  mock developer response still sound like this person? If not, course-correct. The
  persona's NEVER list is absolute.

  ## Output

  Write the complete transcript to {{ run_dir }}/cycle-{{ cycle_number }}/simulate-session-output.md

  Include at the top: which persona, which teaching script, which edge cases.
  End with === SIMULATION NOTES === (facilitator decisions, pacing observations only —
  NO eval scores, NO dimension ratings, NO raw JSON).

extensions:
  - type: builtin
    name: developer

prompt: |
  Simulate a teaching session.
  Persona: {{ persona }}
  Teaching script: teaching/{{ teaching_script }}.teach.md
  Edge cases to force: {{ edge_cases }}
  Write transcript to: {{ run_dir }}/cycle-{{ cycle_number }}/simulate-session-output.md
