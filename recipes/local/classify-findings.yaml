version: 1.0.0
title: "Classify Findings"
description: "Read evaluation reports for this cycle and classify findings into Bucket A (fix now), B (log), or C (harness issue)."

parameters:
  - key: run_dir
    input_type: string
    requirement: required
    description: "Path to the pipeline run directory"
  - key: cycle_number
    input_type: string
    requirement: required
    description: "Current cycle number"

instructions: |
  You are a decision-maker. Read evaluation reports and classify each finding.

  ## Read These Files

  1. All evaluate-transcript-*-output.md files in {{ run_dir }}/cycle-{{ cycle_number }}/
  2. The changelog (if exists): {{ run_dir }}/changelog.md — check what's already been fixed

  ## Classification Rules

  **Bucket A (fix now)** — ALL of these must be true:
  - It's a script bug, fourth-wall break, factual error, or dead-end path
  - It does NOT contradict any previous fix in the changelog
  - The fix is unambiguous (one clear correct change)
  - For Stages 5-7: also catch "facilitator drives when developer should"

  **Bucket B (log for later)** — Everything else:
  - Tone/voice suggestions, alternative phrasings, single-occurrence patterns
  - Structural changes that might help one persona but hurt another

  **Bucket C (harness/simulator issue)** — Problems with the testing itself:
  - Persona fading, transcript format issues, mock model quirks

  **Batch-fix rule:** If a finding matches a structural pattern you've seen in the
  changelog across multiple prior cycles (e.g., "missing enterprise grounding"), note
  it as a batch-fix candidate. List all modules that likely have the same gap.

  ## Output

  Write to: {{ run_dir }}/cycle-{{ cycle_number }}/classify-findings-output.json

  ```json
  {
    "bucket_a": [
      {
        "finding": "Description of the issue",
        "file": "teaching/stage-X/recipe.teach.md",
        "old_text": "Exact text to replace",
        "new_text": "Replacement text",
        "confidence": "high/medium",
        "evidence": "Which evaluator found it and what they said"
      }
    ],
    "bucket_b": [
      {
        "finding": "Description",
        "occurrences": 1,
        "evidence": "Which evaluator, what they said"
      }
    ],
    "bucket_c": [
      {
        "finding": "Description",
        "evidence": "Which evaluator, what they said"
      }
    ],
    "batch_fix_candidates": [
      {
        "pattern": "Description of the structural pattern",
        "affected_modules": ["list", "of", "module", "paths"]
      }
    ]
  }
  ```

extensions:
  - type: builtin
    name: developer

prompt: |
  Read evaluation reports for cycle {{ cycle_number }} and classify findings.
  Eval reports are in: {{ run_dir }}/cycle-{{ cycle_number }}/
  Changelog: {{ run_dir }}/changelog.md
  Write classification to: {{ run_dir }}/cycle-{{ cycle_number }}/classify-findings-output.json
