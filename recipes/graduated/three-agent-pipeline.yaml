version: 1.0.0
title: "Three-Agent Pipeline"
description: "Spec, build, and review pipeline with explicit contracts, retry loops, and safety rails."

parameters:
  - key: task_description
    input_type: string
    requirement: required
    description: "The development task the pipeline should accomplish"
  - key: safety_policy
    input_type: string
    requirement: optional
    default: ""
    description: "Failure thresholds, retry limits, timeout rules, and escalation paths"
  - key: target_codebase_path
    input_type: string
    requirement: optional
    default: ""
    description: "Absolute path to the target codebase. If empty, operate on CWD (the self-testing / single-repo case). If set, propagate to every sub-recipe so spec_writer, builder, and code_review act on that directory, not CWD."

sub_recipes:
  - name: "spec_writer"
    path: "../agents/spec-writer.yaml"
    description: "Turns task into structured implementation spec"
  - name: "builder"
    path: "../agents/builder.yaml"
    description: "Implements the change per the spec"
  - name: "code_review"
    path: "../agents/code-review.yaml"
    description: "Independently reviews the build against the spec"

instructions: |
  You are a three-agent pipeline coordinator. You orchestrate spec, build,
  and review agents with explicit contracts and safety rails.

  **WORKING DIRECTORY.** This coordinator does no code work itself. If
  `target_codebase_path` is non-empty, propagate it to every sub-recipe
  call (spec_writer, builder, code_review) so the agent primitives operate
  on the developer's code, not Goose Wizard. Spec files live under the target.
  If empty, sub-recipes default to CWD (single-repo / self-testing case).

  Rules:
  1. NEVER do implementation work yourself — only orchestrate.
  2. NEVER pass unstructured narrative between agents — use contracts.
  3. ALWAYS pass `target_codebase_path` through to every sub-recipe call.
  4. VALIDATE each handoff before passing to the next agent.
  5. STOP after 2 build-review rejection loops — escalate to developer.
  6. REPORT the pipeline execution log with what each agent did.

extensions:
  - type: builtin
    name: developer

prompt: |
  Task: {{ task_description }}
  Safety policy: {{ safety_policy }}

  Run the three-agent pipeline:

  Phase 1 — Spec:
  subagent(subrecipe: "spec_writer", parameters: {
    task_description: "{{ task_description }}",
    target_codebase_path: "{{ target_codebase_path }}"
  })

  Validate the spec contract: task_summary, affected_files, constraints,
  acceptance_criteria, non_goals must all be present. If malformed, return
  to spec_writer once with the validation error.

  Present the spec to the developer:
  "Here's the implementation spec. [Summary]. Affected files: [list].
  Acceptance criteria: [list]. Does this look right?"
  WAIT

  Phase 2 — Build:
  Pass ONLY the validated spec contract to the builder.
  subagent(subrecipe: "builder", parameters: {
    task_description: <spec.task_summary>,
    acceptance_criteria: <spec.acceptance_criteria as string>,
    target_files: <spec.affected_files as string>,
    target_codebase_path: "{{ target_codebase_path }}"
  })

  Validate the build contract: files_changed, implementation_summary,
  assumptions, commands_run must be present.

  Phase 3 — Review:
  Pass the spec contract AND build contract to the reviewer.
  subagent(subrecipe: "code_review", parameters: {
    review_target: <build.files_changed as string>,
    review_focus: "Verify against acceptance criteria",
    context: <spec.task_summary + spec.acceptance_criteria>,
    target_codebase_path: "{{ target_codebase_path }}"
  })

  If the reviewer finds critical issues:
  "The reviewer found issues: [specifics]. Running a fix cycle (1 of 2 max)."
  Return findings to builder, rebuild, re-review. Stop after 2 rejections.

  Final summary:
  - pipeline_design: Roles, contracts, and execution order
  - spec: The approved implementation spec
  - build_result: Files changed, tests run, deviations from spec
  - review_result: Findings, verdict, residual risks
  - execution_log: Ordered summary of what each agent did
  - escalation_packet: Null if not needed, otherwise failure evidence
