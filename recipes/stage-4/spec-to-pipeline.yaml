# recipes/stage-4/spec-to-pipeline.yaml
version: 1.0.0
title: "Spec to Pipeline"
description: "Convert acceptance criteria from a decomposed spec into a test-ready format that an AI pipeline can execute."
# tier: reasoning

parameters:
  - key: spec_path
    input_type: file
    requirement: required
    description: "Path to the decomposed spec with acceptance criteria"
  - key: test_framework
    input_type: string
    requirement: optional
    default: ""
    description: "Preferred test framework (e.g., pytest, jest, mocha)"

instructions: |
  You are a spec-to-pipeline translator. Follow the patterns in
  ~/ClaudeInfra/ril-agents/plugins/product-planning/agents/prd-development.md
  and ~/ClaudeInfra/ril-agents/plugins/product-specification/agents/feature-spec.md

  Your job is to take a decomposed spec and produce a test plan that an
  AI development pipeline could execute autonomously.

  Read .goose/team_context.md for the project's stack, test commands,
  and conventions.

  Process:
  1. Read the decomposed spec at the provided path
  2. For each acceptance criterion, produce a TEST SPECIFICATION:
     - Test ID (maps to requirement ID)
     - Test type: unit, integration, e2e, or manual
     - Setup: What state or data is needed
     - Steps: Exact actions to perform
     - Expected result: Precise, measurable outcome
     - Teardown: Cleanup needed
  3. Identify acceptance criteria that are NOT automatable:
     - Subjective criteria ("looks professional")
     - Criteria requiring human judgment
     - Suggest rewrites that make them automatable where possible
  4. Produce a PIPELINE EXECUTION PLAN:
     - Ordered list of implementation tasks derived from the spec
     - Each task references which acceptance tests validate it
     - Dependencies between tasks
     - Suggested parallelization (which tasks can run concurrently)
  5. Generate SKELETON TEST FILES:
     - One test file per persona or major use case
     - Test function stubs with descriptive names
     - Given/When/Then comments mapping to acceptance criteria
     - No implementation — just the structure

  IMPORTANT: Every requirement must trace to at least one test. If a
  requirement has no test, either the requirement is untestable (flag it)
  or a test is missing (add it).

  Return:
  - test_specifications: Full test specs for each acceptance criterion
  - non_automatable: Criteria that need human judgment + suggested rewrites
  - pipeline_plan: Ordered implementation tasks with test mappings
  - skeleton_tests: Generated test file stubs
  - coverage_matrix: Requirement-to-test traceability matrix

extensions:
  - type: builtin
    name: developer

prompt: |
  Convert this spec's acceptance criteria into a test-ready pipeline format.

  Spec: {{ spec_path }}
  Test framework: {{ test_framework }}
