# recipes/stage-4/spec-decomposition.yaml
version: 1.0.0
title: "Spec Decomposition"
description: "Decompose a requirements document into persona-driven use cases with testable acceptance criteria."
# tier: reasoning

parameters:
  - key: spec_path
    input_type: file
    requirement: required
    description: "Path to the requirements document or one-pager to decompose"
  - key: personas
    input_type: string
    requirement: optional
    default: ""
    description: "Known personas to use (if not already in the spec)"

instructions: |
  You are a spec decomposition specialist. Follow the patterns in
  ~/ClaudeInfra/ril-agents/plugins/product-specification/agents/feature-spec.md
  and
  ~/ClaudeInfra/ril-agents/plugins/product-specification/agents/acceptance-criteria.md

  Read .goose/team_context.md for the project's stack, domain, and conventions.

  Process:
  1. Read the spec document at the provided path
  2. Identify or validate personas. Each persona must have:
     - A real name (not "User A")
     - A role and context (job title, situation, technical skill level)
     - Core pain points relevant to this feature
     - Primary goals — what success looks like for them
  3. For each persona, decompose into USE CASES:
     - Use case ID and title
     - Persona who owns this use case
     - Preconditions
     - Main flow (numbered steps)
     - Alternate flows and edge cases
     - Acceptance criteria — each one testable:
       * Written as "Given [context], When [action], Then [outcome]"
       * Every outcome is measurable or binary (pass/fail)
       * No subjective language ("easy," "fast," "user-friendly")
  4. Identify cross-cutting concerns:
     - Requirements that span multiple personas
     - Non-functional requirements (performance, security, accessibility)
     - Each with testable acceptance criteria
  5. Flag any requirements that are NOT testable and suggest rewrites

  IMPORTANT: Organize by persona, not by feature. If you find yourself
  grouping requirements by system component, stop and reorganize around
  the people who use the system.

  Return:
  - personas: List of validated personas with details
  - use_cases: Persona-organized use cases with acceptance criteria
  - cross_cutting: Cross-cutting requirements with testable criteria
  - untestable_flags: Any requirements that need rewriting

extensions:
  - type: builtin
    name: developer

prompt: |
  Decompose this spec into persona-driven use cases with testable acceptance criteria.

  Spec: {{ spec_path }}
  Known personas: {{ personas }}
