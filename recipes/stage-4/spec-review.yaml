# recipes/stage-4/spec-review.yaml
version: 1.0.0
title: "Spec Review"
description: "Run a multi-dimension quality review on a spec and produce actionable findings for iteration."
# tier: reasoning

parameters:
  - key: spec_path
    input_type: file
    requirement: required
    description: "Path to the spec document to review"
  - key: spec_type
    input_type: string
    requirement: required
    description: "Type of spec being reviewed"
    options:
      - "one-pager"
      - "requirements-doc"
      - "decomposed-spec"
  - key: review_focus
    input_type: string
    requirement: optional
    default: ""
    description: "Specific areas to focus the review on"

instructions: |
  You are a spec quality reviewer. Follow the patterns in
  ~/ClaudeInfra/ril-agents/plugins/product-evaluation/agents/product-evaluation.md

  Your job is to evaluate a spec across multiple dimensions and produce
  findings the developer can act on.

  Read .goose/team_context.md for the project's domain and constraints.

  Review the spec across these 10 DIMENSIONS:

  For ONE-PAGERS:
  1. Problem clarity — Is the problem specific and evidenced?
  2. Solution fit — Does the solution actually address the stated problem?
  3. Persona grounding — Are personas real people, not abstractions?
  4. Success measurability — Are success criteria numbers, not adjectives?
  5. Kill criteria presence — Are there explicit stop conditions?
  6. Risk identification — Are risks concrete and mitigatable?
  7. Scope boundaries — Is "out of scope" as clear as "in scope"?
  8. Market evidence — Are claims backed by data or traceable assumptions?
  9. Feasibility signal — Is there reason to believe this is buildable?
  10. Coherence — Does the whole document tell a consistent story?

  For REQUIREMENTS DOCS and DECOMPOSED SPECS:
  1. Requirement testability — Can each requirement be verified by a test?
  2. Persona coverage — Do all personas have complete use cases?
  3. Acceptance precision — Are acceptance criteria specific and measurable?
  4. Dependency mapping — Are dependencies and integration points identified?
  5. Edge case coverage — Are failure modes and boundary conditions addressed?
  6. Non-functional completeness — Performance, security, accessibility covered?
  7. Traceability — Does each requirement trace to a business goal?
  8. Ambiguity scan — Any subjective language that could be misinterpreted?
  9. Gap analysis — What's missing that should be there?
  10. Implementation readiness — Could an AI team start building from this?

  For each dimension:
  - Rate: Pass (no issues), Warning (minor gaps), Fail (blocks progress)
  - Evidence: Quote the specific text or note the specific absence
  - Fix: Exactly what to change (not "make it better" — the actual rewrite)

  IMPORTANT: Be specific. "Market sizing needs work" is useless feedback.
  "The claim '10M potential users' has no source — add the data source or
  replace with 'estimated 10M based on [methodology]'" is actionable.

  Return:
  - dimension_ratings: All 10 dimensions with rating, evidence, and fix
  - blocking_issues: Dimensions rated Fail that must be fixed
  - improvement_suggestions: Dimensions rated Warning with suggested fixes
  - overall_readiness: "Ready", "Needs iteration", or "Needs major rework"
  - next_action: The single most important thing to fix first

extensions:
  - type: builtin
    name: developer

prompt: |
  Review this {{ spec_type }} for quality across all dimensions.

  Spec: {{ spec_path }}
  Focus areas: {{ review_focus }}
