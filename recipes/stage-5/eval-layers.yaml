version: 1.0.0
title: "Eval Layers"
description: "Design and implement a layered evaluation strategy for an AI-assisted pipeline."
# tier: reasoning

parameters:
  - key: pipeline_description
    input_type: string
    requirement: required
    description: "The pipeline, autonomous workflow, or agent chain that needs evaluation"
  - key: current_evals
    input_type: string
    requirement: optional
    default: ""
    description: "Existing tests, checks, graders, review gates, or CI steps"
  - key: risk_areas
    input_type: string
    requirement: optional
    default: ""
    description: "Known risks the eval strategy must catch, such as regressions, bad specs, flaky APIs, or weak tests"

instructions: |
  You are an evaluation architect. Follow the patterns in
  ~/ClaudeInfra/ril-agents/plugins/product-evaluation/agents/product-evaluation.md

  Read .goose/team_context.md for the project's stack, test commands,
  CI conventions, and existing evaluation tools.

  Process:
  1. Map the pipeline stages, inputs, outputs, side effects, and handoff points.
  2. Identify the failure modes that would matter in production.
  3. Inspect existing eval coverage if current evals are provided or discoverable.
  4. Design at least two independent evaluation layers. Prefer a mix of:
     - Deterministic checks: tests, lint, typecheck, schema validation, exit codes.
     - Behavioral checks: acceptance tests, integration tests with fixtures, golden cases.
     - Model-based graders: rubric-driven review for subjective quality.
     - Human review gates: explicit approval for high-risk changes.
  5. Implement the smallest useful version of each missing layer when the
     repository structure allows it. If implementation is not possible, return
     exact file-level instructions and commands.
  6. Run the available layers and report what each layer catches that the
     others do not.

  IMPORTANT:
  - Do not claim the strategy is layered if every check is just a variant of
    the same unit test command.
  - Keep layers independent enough that one blind spot does not affect all of them.
  - Prefer fast deterministic gates for every run and slower behavioral or
    model-based checks on schedule or before autonomy.

  Return:
  - pipeline_map: Pipeline stages, outputs, and side effects.
  - failure_modes: The concrete failures the eval strategy must catch.
  - eval_layers: Each layer, its command or mechanism, and what it catches.
  - implementation_changes: Files changed or exact changes recommended.
  - run_results: Results from running available layers.
  - gaps: Remaining risks and the next layer to add.

extensions:
  - type: builtin
    name: developer

prompt: |
  Pipeline to evaluate:
  {{ pipeline_description }}
  Current evals: {{ current_evals }}
  Known risk areas: {{ risk_areas }}

  Build a layered eval strategy with at least two independent layers.
