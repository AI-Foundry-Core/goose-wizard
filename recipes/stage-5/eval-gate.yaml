version: 1.0.0
title: "Eval Gate"
description: "Wire a functioning eval system in front of autonomous pipeline execution."
# tier: reasoning

parameters:
  - key: pipeline_entrypoint
    input_type: string
    requirement: required
    description: "Command, script, workflow, or runbook that starts the autonomous pipeline"
  - key: eval_commands
    input_type: string
    requirement: required
    description: "Commands or checks that must pass before autonomy is enabled"
  - key: autonomy_mode
    input_type: string
    requirement: optional
    default: ""
    description: "How the pipeline runs autonomously, such as overnight batch, scheduled workflow, or multi-agent loop"
  - key: failure_policy
    input_type: string
    requirement: optional
    default: ""
    description: "Desired behavior when evals fail, such as block run, require approval, or fall back to manual mode"

instructions: |
  You are installing a pre-autonomy evaluation gate. Follow the patterns in
  ~/ClaudeInfra/ril-agents/plugins/product-evaluation/agents/product-evaluation.md
  and ~/ClaudeInfra/ril-agents/plugins/product-evaluation/agents/post-mortem.md

  Read .goose/team_context.md for the project's pipeline commands, CI setup,
  safety conventions, and test commands.

  Process:
  1. Inspect the autonomous pipeline entrypoint and identify where it can be
     gated before side effects occur.
  2. Verify each eval command runs independently of the pipeline's own claims.
  3. Define the gate contract:
     - Inputs required to run evals.
     - Commands to run.
     - Pass/fail parsing.
     - Failure policy.
     - Evidence saved for later review.
  4. Implement the smallest preflight gate possible: wrapper script, CI job,
     workflow step, or runbook check.
  5. Make the gate fail closed. If evals fail or cannot run, autonomy must not start.
  6. Run the gate once without starting autonomy if possible. If a dry run is
     impossible, explain the exact manual verification needed.

  IMPORTANT:
  - Do not enable or recommend autonomous operation until evals have actually run.
  - Do not let the autonomous pipeline grade itself.
  - Side-effecting steps must happen after the gate, not before it.
  - Preserve logs or artifacts that prove what the gate checked.

  Return:
  - gate_location: Where the gate sits before autonomous execution.
  - gate_contract: Inputs, commands, pass/fail parsing, and failure policy.
  - implementation_changes: Files changed or exact changes recommended.
  - dry_run_result: Evidence from running the gate without autonomy.
  - autonomy_status: "blocked", "ready_after_gate_passes", or "ready".
  - remaining_risks: What could still escape the gate.

extensions:
  - type: builtin
    name: developer

prompt: |
  Autonomous pipeline entrypoint:
  {{ pipeline_entrypoint }}

  Eval commands:
  {{ eval_commands }}
  Autonomy mode: {{ autonomy_mode }}
  Failure policy: {{ failure_policy }}

  Install or specify a pre-autonomy eval gate. Do not enable autonomy unless the gate runs successfully.
