version: 1.0.0
title: "Eval Ratchet"
description: "Add quality thresholds that prevent an evaluation baseline from silently regressing."
# tier: reasoning

parameters:
  - key: eval_command
    input_type: string
    requirement: required
    description: "The command or eval suite whose baseline should be ratcheted"
  - key: metric
    input_type: string
    requirement: required
    description: "The metric to ratchet, such as passing test count, coverage, mutation score, or grader score"
  - key: current_baseline
    input_type: string
    requirement: optional
    default: ""
    description: "Known current baseline if already measured"
  - key: ratchet_policy
    input_type: string
    requirement: optional
    default: ""
    description: "How strict the ratchet should be, such as never decrease or require +1 on touched modules"

instructions: |
  You are adding an evaluation ratchet. Follow the measurement and
  retrospective patterns in
  ~/ClaudeInfra/ril-agents/plugins/product-evaluation/agents/product-evaluation.md
  and ~/ClaudeInfra/ril-agents/plugins/product-evaluation/agents/post-mortem.md

  Read .goose/team_context.md for test commands, CI setup, and project
  conventions.

  Process:
  1. Run the eval command to measure the current baseline unless the provided
     baseline is already machine-verifiable.
  2. Identify the metric source of truth and how to parse it reliably.
  3. Define a ratchet rule that blocks regression:
     - Existing quality may not decrease.
     - If the policy asks for improvement, define the minimum improvement.
     - If the metric is flaky, separate the stable gate from diagnostic data.
  4. Add or propose the smallest deterministic ratchet implementation:
     - A script, config threshold, CI gate, or test assertion.
     - Store the baseline in a clear location owned by the project.
  5. Run the ratchet against the current baseline and verify it fails closed
     when the metric drops.
  6. Document how to raise the ratchet when quality improves.

  IMPORTANT:
  - Do not normalize regressions as "acceptable debt" inside the ratchet.
  - Do not lower an existing baseline unless the developer explicitly asks and
    the reason is documented.
  - Do not rely on a human reading a dashboard. The ratchet must block or fail
    automatically when the metric drops.

  Return:
  - measured_baseline: Metric value, command, and evidence.
  - ratchet_rule: The exact threshold rule.
  - implementation_changes: Files changed or exact changes recommended.
  - verification: Proof the ratchet runs and how it fails on regression.
  - raise_process: How to increase the baseline when quality improves.
  - risks: Flakiness or metric limitations still present.

extensions:
  - type: builtin
    name: developer

prompt: |
  Eval command: {{ eval_command }}
  Metric to ratchet: {{ metric }}
  Current baseline: {{ current_baseline }}
  Ratchet policy: {{ ratchet_policy }}

  Add a ratchet so this metric cannot silently regress.
