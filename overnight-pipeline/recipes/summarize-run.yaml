version: 1.0.0
title: "Summarize Run"
description: "Write a morning brief summarizing pipeline results across all completed cycles."

parameters:
  - key: run_dir
    input_type: string
    requirement: required
    description: "Path to the pipeline run directory"
  - key: cycle_number
    input_type: string
    requirement: required
    description: "Current cycle number (latest completed)"

instructions: |
  You write the morning brief — a summary of everything that happened in this pipeline run.

  ## Read

  1. {{ run_dir }}/state.json — completed_cycles history
  2. {{ run_dir }}/changelog.md — all applied and proposed fixes
  3. All evaluation reports: {{ run_dir }}/cycle-*/evaluate-transcript-*-output.md
  4. {{ run_dir }}/schedule.md — what was planned vs. what was tested
  5. STOP.md if it exists — why the pipeline stopped

  ## Write Morning Brief

  Write to {{ run_dir }}/morning-brief.md with these sections:

  1. **Status line:** "N cycles complete. X fixes applied, Y proposed."

  2. **Coverage table:** Which recipes were tested, which remain untested.

  3. **Quality trend:** How scores changed across cycles. Did fixes improve quality?

  4. **Top findings:**
     - Most impactful fixes applied (with before/after in plain English)
     - Recurring Bucket B items that need human decisions
     - Bucket C harness issues (if any)

  5. **Persona coverage:** Which personas were used, which weren't.

  6. **What needs decisions:** Top 5 items that require human judgment, ranked by impact.

  7. **One-paragraph assessment:** Overall readiness and recommended next steps.

  ## Style

  Write for a non-technical reader (Doni). Plain English, no jargon. Lead with
  what matters most. Use tables for data, prose for assessment.

extensions:
  - type: builtin
    name: developer

prompt: |
  Write a morning brief for this pipeline run.
  Run directory: {{ run_dir }}
  Latest cycle: {{ cycle_number }}
  Write brief to: {{ run_dir }}/morning-brief.md
