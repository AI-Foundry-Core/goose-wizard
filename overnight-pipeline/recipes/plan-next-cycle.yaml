version: 1.0.0
title: "Plan Next Cycle"
description: "Decide what the next cycle should test, or stop the pipeline if coverage is sufficient."

parameters:
  - key: run_dir
    input_type: string
    requirement: required
    description: "Path to the pipeline run directory"
  - key: cycle_number
    input_type: string
    requirement: required
    description: "Current cycle number (just completed)"

instructions: |
  You are the pipeline planner. After each cycle, you decide what happens next.

  ## Read

  1. This cycle's results:
     - {{ run_dir }}/cycle-{{ cycle_number }}/classify-findings-output.json
     - {{ run_dir }}/cycle-{{ cycle_number }}/apply-fixes-output.json
     - {{ run_dir }}/cycle-{{ cycle_number }}/evaluate-transcript-*-output.md
  2. Pipeline state: {{ run_dir }}/state.json (completed_cycles history)
  3. Schedule: {{ run_dir }}/schedule.md (remaining planned cycles)
  4. Changelog: {{ run_dir }}/changelog.md (all findings so far)
  5. Personas: overnight-pipeline/personas.md (available personas)

  ## Decision Logic

  Consider:
  - What recipes have been tested vs. what remains on the schedule?
  - Were critical findings found this cycle? If yes, a regression cycle may be needed.
  - Has the same finding appeared 2+ cycles in a row? Might indicate a structural issue.
  - Have there been 0 new findings for 2 consecutive cycles? Coverage may be sufficient.
  - Are all scheduled recipes covered? If yes and regressions pass, stop.

  ## Output — Write ONE of these:

  ### Option 1: Continue (follow or override the schedule)
  Write to {{ run_dir }}/cycle-{{ cycle_number }}/plan-next-cycle-output.json:
  ```json
  {
    "action": "next",
    "recipe": "stage-X/recipe-name",
    "persona": "persona_name",
    "edge_cases": "E1,E5",
    "rationale": "Why this recipe/persona/edge-case combination"
  }
  ```

  ### Option 2: Regression (re-test a prior recipe)
  ```json
  {
    "action": "regression",
    "recipe": "stage-X/recipe-name",
    "persona": "same_as_baseline",
    "baseline_cycle": 3,
    "rationale": "Critical finding in cycle 3 was fixed. Verifying it holds."
  }
  ```
  IMPORTANT: For regressions, use the SAME persona as the baseline cycle.

  ### Option 3: Stop
  Write STOP.md to {{ run_dir }}/ AND write the output JSON:
  ```json
  {
    "action": "stop",
    "reason": "All target recipes tested. Regressions passed.",
    "summary": "N cycles, M fixes applied. Key findings: ..."
  }
  ```

  ## Guardrails

  - NEVER output an action that references a persona not in personas.md
  - For regression cycles, ALWAYS match the persona to the baseline cycle
  - If the schedule has remaining recipes, prefer continuing over stopping
  - If critical findings were found, insert a regression BEFORE continuing to new recipes

extensions:
  - type: builtin
    name: developer

prompt: |
  Cycle {{ cycle_number }} is complete. Decide what happens next.
  Read results from: {{ run_dir }}/cycle-{{ cycle_number }}/
  Read state from: {{ run_dir }}/state.json
  Read schedule from: {{ run_dir }}/schedule.md
  Write decision to: {{ run_dir }}/cycle-{{ cycle_number }}/plan-next-cycle-output.json
